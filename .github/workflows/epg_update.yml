name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'   # 每天北京时间早上6点（UTC 22:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and push EPG
        run: |
          chmod +x update_epg.sh
          bash update_epg.sh
